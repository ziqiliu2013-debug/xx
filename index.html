<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#7559e8"><title>星芽暑假学习营</title><link rel="stylesheet" href="style.css?v=3"></head>
<body><header class="hero"><div><p class="eyebrow">六年级预习 · 第 <span id="weekNo">1</span> 周</p><h1>早上好，小小探索家 🌱</h1><p id="dateText"></p></div><button class="icon-btn" id="parentBtn">🔒</button></header><main>
<section class="score-card"><div class="ring" id="scoreRing"><strong id="totalScore">0</strong><span>今日分</span></div><div class="score-copy"><p>今日能量</p><h2><span id="stars">0</span> ⭐</h2><small id="encouragement"></small></div><div class="streak"><b id="streak">0</b><span>连续打卡</span></div></section>
<nav class="tabs"><button class="active" data-page="today">今日任务</button><button data-page="plan">8周计划</button><button data-page="growth">成长花园</button><button data-page="report">学习总结</button></nav>
<section class="page active" id="today"><div class="section-title"><div><span>今天的挑战</span><small id="doneCount"></small></div><button id="resetToday" class="text-btn">重新评分</button></div><div id="taskList" class="task-list"></div></section>
<section class="page" id="plan"><div class="section-title"><div><span>暑假成长地图</span><small>每周学习6天，第7天复盘休息</small></div></div><div id="planList" class="plan-list"></div></section>
<section class="page" id="growth"><div class="level-card"><span>当前等级</span><h2 id="levelName"></h2><div class="progress"><i id="levelProgress"></i></div><small id="levelHint"></small></div><h3>我的徽章</h3><div class="badges" id="badges"></div><h3>近7天能量</h3><div class="chart" id="weekChart"></div></section>
<section class="page" id="report"><div class="report-card"><p class="eyebrow">本周学习评分</p><div class="big-grade"><strong id="weekScore">0</strong><span>/ 100</span></div><p id="summaryText"></p></div><div id="subjectStats" class="subject-stats"></div><div class="suggestion"><h3>下周小目标 🎯</h3><p id="nextGoal"></p></div></section></main>
<dialog id="scoreDialog"><form method="dialog"><button class="close" value="cancel">×</button><div class="modal-head"><span id="modalIcon"></span><div><small>完成任务后自评</small><h2 id="modalTitle"></h2></div></div><div id="scoreFields"></div><div class="total-preview">本次得分 <strong id="previewScore">0</strong> / 100</div><button class="primary" id="saveScore">保存评分，获得星星</button></form></dialog>
<dialog id="lessonDialog"><form method="dialog"><button class="close" value="cancel">×</button><div class="modal-head"><span id="lessonIcon"></span><div><small id="lessonMeta"></small><h2 id="lessonTitle"></h2></div></div><div id="lessonBody"></div><button class="primary" id="finishLesson">学完了，去评分</button></form></dialog>
<dialog id="pinDialog"><form method="dialog"><button class="close" value="cancel">×</button><h2>进入家长中心</h2><p class="muted">请输入4位密码。首次使用默认密码为 1234。</p><label>家长密码<input id="pinInput" type="password" inputmode="numeric" maxlength="4" placeholder="••••"></label><p class="error" id="pinError"></p><button class="primary" id="unlockParent">确认进入</button></form></dialog>
<dialog id="parentDialog"><form method="dialog"><button class="close" value="cancel">×</button><h2>家长中心</h2><p class="muted">设置计划、修改密码或备份学习记录。</p><label>孩子称呼<input id="childName" type="text" maxlength="12"></label><label>暑假开始日期<input id="startDate" type="date"></label><label>新家长密码<input id="newPin" type="password" inputmode="numeric" maxlength="4" placeholder="不修改请留空"></label><div id="taskEditors"></div><button class="primary" id="saveSettings">保存设置</button><div class="export-row"><button id="exportCsv" type="button">导出评分表</button><button id="exportJson" type="button">备份数据</button></div><button class="danger" id="clearData" type="button">清空全部学习记录</button></form></dialog>
<script src="plan.js?v=3"></script><script src="lessons.js?v=3"></script><script src="app.js?v=3"></script></body></html>
